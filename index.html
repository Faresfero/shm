<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            /* prefer a generic fallback and control weight with font-weight */
            font-family: 'Roboto', sans-serif;
            background-color: #1e1f22;
            color: white;
            text-align: center;
            padding: 20px;
        }
h1 {
  font-size: 72px;
  background: -webkit-linear-gradient(#eee, #333);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
        .subtext {
            color: #b9bbbe;
            margin-bottom: 20px;
        }
        .search-bar {
            background-color: #2b2d31;
            border: none;
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background-color: #2b2d31;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            color: white;
        }
        .filter-btn:hover {
            background-color: #5865F2;
        }
        .servers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .server-card {
            background-color: #23272a;
            width: 220px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            transition: 0.3s;
        }
        .server-card:hover {
            background-color: #2b2d31;
        }
        .server-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }
        .server-info {
            margin-top: 10px;
        }
        .server-name {
            font-size: 16px;
            font-weight: bold;
            color: #7289da;
            text-decoration: none;
        }
        .server-invite {
            color: #b9bbbe;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .join-btn {
            display: block;
            background-color: #5865F2;
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }
        .join-btn:hover {
            background-color: #4752C4;
            transform: scale(1.05);
        }
        .publish-btn {
            background-color: #5865F2;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .publish-btn:hover {
            background-color: #4752C4;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>shmods</h1>
    <p class="subtext">Explore smash hit mods!</p>
    <!-- Accessible search input: use id + aria-label and debounce in JS -->
    <input id="search-input" type="search" class="search-bar" placeholder="Search smash hit mods or user" aria-label="Search mods"> 
    <div class="filters">
        <!-- data-category used by JS listeners -->
        <button type="button" class="filter-btn" data-category="all">All</button>
        <button type="button" class="filter-btn" data-category="and">Android</button>
        <button type="button" class="filter-btn" data-category="ios">iOS</button>
        <button type="button" class="filter-btn" data-category="both">Android & iOS</button>
    </div>

    <h2></h2>

    <div class="servers" id="server-list"></div>
    <div id="no-results" style="color:#b9bbbe; margin-top:12px; display:none;">No mods found.</div>

<p>Want to Publish your smash hit mod?  
    <a class="publish-btn" href="https://sites.google.com/view/shmods/submit" target="_blank" rel="noopener noreferrer">
        Click Here
    </a>

</p>
<p style="color: gray;">
    Made by source
</p>



    <!-- Load server-hosted JavaScript from GitHub raw URL (replace if needed) -->
    <script src="https://raw.githack.com/Faresfero/shm/main/main.js"></script>

</body>
</html>
